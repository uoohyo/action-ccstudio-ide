name: Test CCS Versions

on:
  workflow_dispatch:
    inputs:
      versions:
        description: 'CCS versions to test (comma-separated, e.g., 20.5.0.00028,20.4.1.00004)'
        required: false
        default: '20.5.0.00028,20.4.1.00004,19.1.0.00006'
      test-build:
        description: 'Test actual project build (requires sample project)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  test-docker-build:
    name: Test Docker Build - CCS ${{ matrix.version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJson(format('["{0}"]', github.event.inputs.versions || '20.5.0.00028')) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test build Docker image with CCS ${{ matrix.version }}
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: action-ccstudio-ide:test-${{ matrix.version }}
          build-args: |
            CCS_VERSION=${{ matrix.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify Docker image
        run: |
          echo "Checking if image was built successfully..."
          docker images | grep "action-ccstudio-ide"

          echo ""
          echo "Image details:"
          docker inspect action-ccstudio-ide:test-${{ matrix.version }} | grep -A 5 "Labels"

      - name: Test CCS installation in container
        run: |
          echo "Testing CCS installation paths..."
          docker run --rm action-ccstudio-ide:test-${{ matrix.version }} \
            bash -c '
              if [ -d "/opt/ti/ccs/eclipse" ]; then
                echo "✓ CCS installation found at /opt/ti/ccs/eclipse"
                ls -la /opt/ti/ccs/eclipse/ | head -10
              elif [ -d "/opt/ti/ccsv8/eclipse" ]; then
                echo "✓ CCS installation found at /opt/ti/ccsv8/eclipse"
                ls -la /opt/ti/ccsv8/eclipse/ | head -10
              elif [ -d "/opt/ti/ccsv7/eclipse" ]; then
                echo "✓ CCS installation found at /opt/ti/ccsv7/eclipse"
                ls -la /opt/ti/ccsv7/eclipse/ | head -10
              else
                echo "✗ CCS installation not found"
                exit 1
              fi
            '

      - name: Test entrypoint script
        run: |
          echo "Testing entrypoint script syntax..."
          docker run --rm action-ccstudio-ide:test-${{ matrix.version }} \
            bash -c 'bash -n /entrypoint.sh && echo "✓ Entrypoint script syntax is valid"'

      - name: Report test result
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ CCS ${{ matrix.version }} - Docker build test PASSED"
          else
            echo "❌ CCS ${{ matrix.version }} - Docker build test FAILED"
          fi

  test-matrix-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: test-docker-build
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## 🧪 CCS Version Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tested versions: \`${{ github.event.inputs.versions || '20.5.0.00028' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.test-docker-build.result }}" == "success" ]; then
            echo "✅ **All tests passed!**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "You can now run the sync-versions workflow to create tags for all supported versions." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Some tests failed**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Please check the failed jobs and fix any issues before creating tags." >> $GITHUB_STEP_SUMMARY
          fi

  # Optional: Test with actual CCS project build
  # Requires a sample CCS project in the repository
  test-actual-build:
    name: Test Actual Build - CCS ${{ matrix.version }}
    runs-on: ubuntu-latest
    if: github.event.inputs.test-build == 'true'
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJson(format('["{0}"]', github.event.inputs.versions || '20.5.0.00028')) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for sample project
        id: check-sample
        run: |
          if [ -d "test/sample-c2000" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "✓ Sample C2000 project found"
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "⚠️  No sample project found at test/sample-c2000"
            echo "Skipping actual build test..."
          fi

      - name: Build sample C2000 project with CCS ${{ matrix.version }}
        if: steps.check-sample.outputs.found == 'true'
        uses: ./
        with:
          project-path: 'test/sample-c2000'
          project-name: 'sample-c2000'
          build-config: 'Debug'
          components: 'PF_C28'

      - name: Verify build artifacts
        if: steps.check-sample.outputs.found == 'true'
        run: |
          echo "Checking for build output..."
          if [ -d "test/sample-c2000/Debug" ] && [ -f "test/sample-c2000/Debug/sample-c2000.out" ]; then
            echo "✓ Build artifacts found"
            ls -lh test/sample-c2000/Debug/
          else
            echo "✗ Build artifacts not found"
            ls -la test/sample-c2000/ || true
            exit 1
          fi
