name: Fix Existing Tags

# This workflow retroactively fixes all existing tags to use version-specific Dockerfiles
# Run this manually after merging the version detection fix to apply it to all historical tags

on:
  workflow_dispatch:

jobs:
  fix-tags:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history including tags
          ref: main

      - name: Get all version tags
        id: get-tags
        run: |
          echo "Fetching all version tags..."
          git fetch --tags

          # Get all full version tags (v#.#.#.#####)
          VERSION_TAGS=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*.[0-9]*' | sort -V)

          if [ -z "$VERSION_TAGS" ]; then
            echo "No version tags found"
            exit 0
          fi

          echo "Found version tags:"
          echo "$VERSION_TAGS"

          echo "tags<<EOF" >> $GITHUB_OUTPUT
          echo "$VERSION_TAGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          COUNT=$(echo "$VERSION_TAGS" | wc -l)
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Recreate tags with version-specific Dockerfiles
        if: steps.get-tags.outputs.count > 0
        run: |
          TAGS="${{ steps.get-tags.outputs.tags }}"

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          FIXED_COUNT=0
          FAILED_COUNT=0

          while IFS= read -r tag; do
            if [ -z "$tag" ]; then
              continue
            fi

            # Extract version from tag (remove 'v' prefix)
            version="${tag#v}"

            echo "=================================================="
            echo "Fixing tag: $tag (CCS version ${version})"
            echo "=================================================="

            # Create a temporary branch from main
            BRANCH="fix-release/temp-${version}"
            git checkout -b "$BRANCH" main || {
              echo "❌ Failed to create branch $BRANCH"
              FAILED_COUNT=$((FAILED_COUNT + 1))
              git checkout main 2>/dev/null || true
              continue
            }

            # Modify Dockerfile to hardcode this version
            sed -i "s/ARG CCS_VERSION=latest/ARG CCS_VERSION=${version}/" Dockerfile

            # Check if Dockerfile was actually modified
            if ! git diff --quiet Dockerfile; then
              # Commit the version-specific Dockerfile
              git add Dockerfile
              git commit -m "Set CCS version to ${version} for release ${tag}"

              # Delete the old tag locally and remotely
              git tag -d "$tag" 2>/dev/null || true
              git push origin ":refs/tags/$tag" 2>/dev/null || true

              # Create new annotated tag from this commit
              git tag -a "$tag" -m "CCS version ${version}" || {
                echo "❌ Failed to create tag $tag"
                FAILED_COUNT=$((FAILED_COUNT + 1))
                git checkout main
                git branch -D "$BRANCH"
                continue
              }

              # Push the new tag
              git push origin "$tag" || {
                echo "❌ Failed to push tag $tag"
                FAILED_COUNT=$((FAILED_COUNT + 1))
                git checkout main
                git branch -D "$BRANCH"
                continue
              }

              echo "✅ Fixed tag $tag"
              FIXED_COUNT=$((FIXED_COUNT + 1))
            else
              echo "ℹ️  Tag $tag already has correct Dockerfile (skipping)"
            fi

            # Return to main and clean up branch
            git checkout main
            git branch -D "$BRANCH"

          done <<< "$TAGS"

          echo ""
          echo "=================================================="
          echo "Summary:"
          echo "  Fixed: $FIXED_COUNT"
          echo "  Failed: $FAILED_COUNT"
          echo "  Total: ${{ steps.get-tags.outputs.count }}"
          echo "=================================================="

      - name: Update version aliases
        if: steps.get-tags.outputs.count > 0
        run: |
          echo "Updating version aliases after tag fixes..."

          # Get all version tags
          ALL_VERSIONS=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*.[0-9]*' | sed 's/^v//' | sort -V)

          # Track which aliases we've already updated
          declare -A UPDATED_MAJOR
          declare -A UPDATED_MINOR

          # Process versions in reverse (newest first)
          while IFS= read -r version; do
            MAJOR=$(echo "$version" | cut -d. -f1)
            MINOR=$(echo "$version" | cut -d. -f2)
            PATCH=$(echo "$version" | cut -d. -f3)

            MAJOR_TAG="v${MAJOR}"
            MINOR_TAG="v${MAJOR}.${MINOR}"
            PATCH_TAG="v${MAJOR}.${MINOR}.${PATCH}"

            # Update major tag (e.g., v20) - only once for the latest version
            if [ -z "${UPDATED_MAJOR[$MAJOR]}" ]; then
              echo "Updating $MAJOR_TAG -> v${version}"
              git tag -f -a "$MAJOR_TAG" -m "Latest CCS v${MAJOR}.x: ${version}"
              git push -f origin "$MAJOR_TAG"
              UPDATED_MAJOR[$MAJOR]=1
            fi

            # Update minor tag (e.g., v20.5) - only once for the latest patch
            if [ -z "${UPDATED_MINOR[${MAJOR}.${MINOR}]}" ]; then
              echo "Updating $MINOR_TAG -> v${version}"
              git tag -f -a "$MINOR_TAG" -m "Latest CCS v${MAJOR}.${MINOR}.x: ${version}"
              git push -f origin "$MINOR_TAG"
              UPDATED_MINOR[${MAJOR}.${MINOR}]=1
            fi

            # Update patch tag (e.g., v20.5.1) - always update to latest build
            echo "Updating $PATCH_TAG -> v${version}"
            git tag -f -a "$PATCH_TAG" -m "Latest CCS v${MAJOR}.${MINOR}.${PATCH}.x: ${version}"
            git push -f origin "$PATCH_TAG"

          done <<< "$(echo "$ALL_VERSIONS" | tac)"  # Reverse to process newest first

          echo "✅ Version aliases updated!"

      - name: Summary
        if: always()
        run: |
          echo "## 🔧 Tag Fix Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This workflow retroactively fixed existing tags to use version-specific Dockerfiles." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Total tags processed**: ${{ steps.get-tags.outputs.count || 0 }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### What Changed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Each version tag now points to a commit with:" >> $GITHUB_STEP_SUMMARY
          echo "- \`Dockerfile\` with \`ARG CCS_VERSION=<specific-version>\` hardcoded" >> $GITHUB_STEP_SUMMARY
          echo "- Correct base image: \`uoohyo/ccstudio-ide:<version>\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This fixes the bug where all action versions reported v20.5.1.00012." >> $GITHUB_STEP_SUMMARY
