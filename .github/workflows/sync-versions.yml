name: Sync CCS Versions

on:
  push:
    branches:
      - main
  repository_dispatch:
    types: [new-ccs-version]
  workflow_dispatch:

jobs:
  sync-versions:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for tagging
          ref: main  # Sync versions from main branch

      - name: Fetch available CCS versions from docker-ccstudio-ide
        id: fetch-versions
        run: |
          echo "Fetching versions from docker-ccstudio-ide repository..."

          # Fetch versions.md from docker-ccstudio-ide
          VERSIONS_URL="https://raw.githubusercontent.com/uoohyo/docker-ccstudio-ide/main/docs/versions.md"
          curl -fsSL "$VERSIONS_URL" -o /tmp/versions.md

          # Extract supported versions (those with available badge)
          # Format: | `20.5.1.00012` | ![available](...) | ... |
          # Sort in ascending order (oldest first, same as docker-ccstudio-ide build order)
          VERSIONS=$(grep '!\[available\]' /tmp/versions.md | grep -oE '[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' | awk '!seen[$0]++' | sort -V || true)

          if [ -z "$VERSIONS" ]; then
            echo "No versions found in versions.md"
            exit 1
          fi

          echo "Found versions (sorted oldest → newest):"
          echo "$VERSIONS"

          # Save to output
          echo "versions<<EOF" >> $GITHUB_OUTPUT
          echo "$VERSIONS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # Count versions
          VERSION_COUNT=$(echo "$VERSIONS" | wc -l)
          echo "count=$VERSION_COUNT" >> $GITHUB_OUTPUT

      - name: Get existing tags
        id: existing-tags
        run: |
          echo "Fetching existing tags..."
          git fetch --tags
          EXISTING_TAGS=$(git tag -l 'v*' | sed 's/^v//' || true)

          echo "existing<<EOF" >> $GITHUB_OUTPUT
          echo "$EXISTING_TAGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Determine new versions to tag
        id: new-versions
        run: |
          VERSIONS="${{ steps.fetch-versions.outputs.versions }}"
          EXISTING="${{ steps.existing-tags.outputs.existing }}"

          # Find versions that don't have tags yet
          NEW_VERSIONS=""
          while IFS= read -r version; do
            if ! echo "$EXISTING" | grep -q "^${version}$"; then
              NEW_VERSIONS="${NEW_VERSIONS}${version}"$'\n'
            fi
          done <<< "$VERSIONS"

          # Remove trailing newline
          NEW_VERSIONS=$(echo "$NEW_VERSIONS" | sed '/^$/d')

          if [ -z "$NEW_VERSIONS" ]; then
            echo "No new versions to tag"
            echo "count=0" >> $GITHUB_OUTPUT
          else
            echo "New versions to tag:"
            echo "$NEW_VERSIONS"
            echo "new<<EOF" >> $GITHUB_OUTPUT
            echo "$NEW_VERSIONS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT

            COUNT=$(echo "$NEW_VERSIONS" | wc -l)
            echo "count=$COUNT" >> $GITHUB_OUTPUT
          fi

      - name: Create tags and releases
        if: steps.new-versions.outputs.count > 0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_VERSIONS="${{ steps.new-versions.outputs.new }}"

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          while IFS= read -r version; do
            if [ -z "$version" ]; then
              continue
            fi

            TAG="v${version}"
            echo "Creating tag and release for $TAG..."

            # Parse version components
            MAJOR=$(echo "$version" | cut -d. -f1)
            MINOR=$(echo "$version" | cut -d. -f2)
            PATCH=$(echo "$version" | cut -d. -f3)
            BUILD=$(echo "$version" | cut -d. -f4)

            # Create a temporary branch from main for this version
            BRANCH="release/temp-${version}"
            git checkout -b "$BRANCH" main

            # Modify Dockerfile to hardcode this version
            sed -i "s/ARG CCS_VERSION=latest/ARG CCS_VERSION=${version}/" Dockerfile

            # Commit the version-specific Dockerfile
            git add Dockerfile
            git commit -m "Set CCS version to ${version} for release ${TAG}"

            # Create annotated tag from this commit
            git tag -a "$TAG" -m "CCS version ${version}" || {
              echo "Failed to create tag $TAG"
              git checkout main
              git branch -D "$BRANCH"
              continue
            }

            # Push the tag (not the branch)
            git push origin "$TAG" || {
              echo "Failed to push tag $TAG"
              git checkout main
              git branch -D "$BRANCH"
              continue
            }

            # Return to main and clean up branch
            git checkout main
            git branch -D "$BRANCH"

            # Create GitHub Release
            gh release create "$TAG" \
              --title "CCS ${version}" \
              --notes "$(cat <<-EOF
          ## Code Composer Studio v${version}

          This release uses the pre-built Docker image with CCS **${version}** from [docker-ccstudio-ide](https://github.com/uoohyo/docker-ccstudio-ide).

          ### Usage

          \`\`\`yaml
          - uses: uoohyo/action-ccstudio-ide@${TAG}
            with:
              project-path: 'path/to/project'
              project-name: 'YourProject'
              build-config: 'Debug'
              components: 'PF_C28'
          \`\`\`

          ### What's Changed

          - CCS Version: **${version}**
          - Base Image: \`uoohyo/ccstudio-ide:${version}\`
          - Docker Hub: https://hub.docker.com/r/uoohyo/ccstudio-ide/tags

          ### Installation Time

          ⚡ **No installation needed** - CCS is pre-installed in the Docker image, reducing build time from 15-30 minutes to 1-3 minutes!
          EOF
          )" || {
              echo "Failed to create release for $TAG"
              continue
            }

            echo "✅ Created tag and release: $TAG"

          done <<< "$NEW_VERSIONS"

          echo "Tag creation complete!"

      - name: Update version aliases
        if: steps.fetch-versions.outputs.count > 0
        run: |
          echo "Updating version aliases (v20, v20.5, etc.)..."

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Get all version tags
          ALL_VERSIONS=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*.[0-9]*' | sed 's/^v//' | sort -V)

          # Track which aliases we've already updated
          declare -A UPDATED_MAJOR
          declare -A UPDATED_MINOR

          # Process versions in reverse (newest first)
          while IFS= read -r version; do
            MAJOR=$(echo "$version" | cut -d. -f1)
            MINOR=$(echo "$version" | cut -d. -f2)
            PATCH=$(echo "$version" | cut -d. -f3)

            MAJOR_TAG="v${MAJOR}"
            MINOR_TAG="v${MAJOR}.${MINOR}"
            PATCH_TAG="v${MAJOR}.${MINOR}.${PATCH}"
            FULL_TAG="v${version}"

            # Get the commit that the full version tag points to
            TARGET_COMMIT=$(git rev-parse "${FULL_TAG}^{commit}")

            # Update major tag (e.g., v20) - only once for the latest version
            # Point to the same commit as the full version tag
            if [ -z "${UPDATED_MAJOR[$MAJOR]}" ]; then
              echo "Updating $MAJOR_TAG -> v${version} (commit: ${TARGET_COMMIT:0:7})"
              git tag -f -a "$MAJOR_TAG" -m "Latest CCS v${MAJOR}.x: ${version}" "$TARGET_COMMIT"
              git push -f origin "$MAJOR_TAG"
              UPDATED_MAJOR[$MAJOR]=1
            fi

            # Update minor tag (e.g., v20.5) - only once for the latest patch
            # Point to the same commit as the full version tag
            if [ -z "${UPDATED_MINOR[${MAJOR}.${MINOR}]}" ]; then
              echo "Updating $MINOR_TAG -> v${version} (commit: ${TARGET_COMMIT:0:7})"
              git tag -f -a "$MINOR_TAG" -m "Latest CCS v${MAJOR}.${MINOR}.x: ${version}" "$TARGET_COMMIT"
              git push -f origin "$MINOR_TAG"
              UPDATED_MINOR[${MAJOR}.${MINOR}]=1
            fi

            # Update patch tag (e.g., v20.5.1) - always update to latest build
            # Point to the same commit as the full version tag
            echo "Updating $PATCH_TAG -> v${version} (commit: ${TARGET_COMMIT:0:7})"
            git tag -f -a "$PATCH_TAG" -m "Latest CCS v${MAJOR}.${MINOR}.${PATCH}.x: ${version}" "$TARGET_COMMIT"
            git push -f origin "$PATCH_TAG"

          done <<< "$(echo "$ALL_VERSIONS" | tac)"  # Reverse to process newest first

          # Update 'latest' tag to point to the newest version's commit
          LATEST_VERSION=$(echo "$ALL_VERSIONS" | tail -1)
          if [ -n "$LATEST_VERSION" ]; then
            LATEST_TAG="v${LATEST_VERSION}"
            LATEST_COMMIT=$(git rev-parse "${LATEST_TAG}^{commit}")
            echo "Updating latest -> v${LATEST_VERSION} (commit: ${LATEST_COMMIT:0:7})"
            git tag -f -a "latest" -m "Latest CCS version: ${LATEST_VERSION}" "$LATEST_COMMIT"
            git push -f origin "latest"
            echo "✅ 'latest' tag updated to v${LATEST_VERSION}"
          fi

          echo "✅ Version aliases updated!"

      - name: Update README badge
        if: steps.fetch-versions.outputs.count > 0
        run: |
          # Get oldest and newest versions from all fetched versions
          OLDEST=$(echo "${{ steps.fetch-versions.outputs.versions }}" | head -1)
          NEWEST=$(echo "${{ steps.fetch-versions.outputs.versions }}" | tail -1)

          if [ -z "$OLDEST" ] || [ -z "$NEWEST" ]; then
            echo "⚠️ Could not determine version range, skipping README update"
            exit 0
          fi

          # Extract major.minor versions
          OLDEST_SHORT=$(echo "$OLDEST" | grep -oE '^[0-9]+\.[0-9]+')
          NEWEST_SHORT=$(echo "$NEWEST" | grep -oE '^[0-9]+\.[0-9]+')

          # Update README badge
          sed -i "s/CCS-v[0-9.]*--v[0-9.]*/CCS-v${OLDEST_SHORT}--v${NEWEST_SHORT}/g" README.md

          # Commit if changed
          if ! git diff --quiet README.md; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "📝 docs: auto-update CCS version badge to v${OLDEST_SHORT}--v${NEWEST_SHORT}"
            git push origin main
            echo "✅ README badge updated"
          else
            echo "ℹ️ README badge already up to date"
          fi

      - name: Summary
        if: always()
        run: |
          echo "## 🔄 Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Total CCS versions available**: ${{ steps.fetch-versions.outputs.count }}" >> $GITHUB_STEP_SUMMARY
          echo "- **New versions tagged**: ${{ steps.new-versions.outputs.count || 0 }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.new-versions.outputs.count || 0 }}" -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### ✨ New Versions Created" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "${{ steps.new-versions.outputs.new }}" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ All versions are up to date. No new tags created." >> $GITHUB_STEP_SUMMARY
          fi
