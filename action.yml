name: 'Build with Code Composer Studio™ integrated development environment (IDE)'
description: 'Build projects using Code Composer Studio IDE Docker image'
inputs:
    project-path:
        description: 'Path to the project directory'
        required: true
    project-name:
        description: 'Name of the project to build'
        required: true
    build-config:
        description: 'Build configuration (e.g., Debug or Release)'
        required: false
        default: 'Debug'
    components:
        description: 'Components to install (e.g., PF_C28)'
        required: false
        default: 'PF_C28'
    auto-import:
        description: 'Automatically import all projects found under project-path (useful for workspaces with shared dependencies)'
        required: false
        default: 'false'

runs:
    using: 'docker'
    image: 'Dockerfile'
    env:
        COMPONENTS: ${{ inputs.components }}
    args:
        - ${{ inputs.project-path }}
        - ${{ inputs.project-name }}
        - ${{ inputs.build-config }}
        - ${{ inputs.auto-import }}
